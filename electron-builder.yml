appId: com.hoard.app
productName: Hoard
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - '!**/{.eslintrc.js,eslint.config.mjs,.prettier*,.git,.gitignore}'
# Unpack better-sqlite3 native binary from the asar archive so it can be dlopen'd
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
# Include browser extension so users can load it directly from the app
extraResources:
  - from: extension
    to: extension
# Rebuild native modules against Electron's Node.js ABI before packaging
npmRebuild: true
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
win:
  executableName: Hoard
  icon: resources/icon.png
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
